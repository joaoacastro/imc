<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Calculadora de IMC simples e acessível para verificar o índice de massa corporal."
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Calculadora de IMC</title>
  </head>
  <body>
    <main class="card">
      <section class="entrada" id="entrada">
        <header class="entrada-header">
          <h1>Calculadora de IMC</h1>
          <p>
            Informe sua altura e peso para ver sua faixa de índice de massa
            corporal.
          </p>
        </header>

        <form id="imcForm" novalidate>
          <div class="containerEntrada">
            <label for="altura">Altura (m)</label>
            <input
              type="number"
              id="altura"
              class="inputAltura"
              placeholder="1.80"
              min="0.50"
              max="2.50"
              step="0.01"
              required
            />

            <label for="peso">Peso (kg)</label>
            <input
              type="number"
              id="peso"
              class="inputPeso"
              placeholder="90"
              min="10"
              max="300"
              step="0.1"
              required
            />
          </div>

          <div class="acoes">
            <button type="submit" id="botaoCalcular">Calcular IMC</button>
          </div>
        </form>
      </section>

      <section class="saida hidden" id="saida" aria-live="polite">
        <div id="valoresEntrada" class="resultado__texto"></div>
        <div
          id="resultadoTexto"
          class="resultado__texto resultado__categoria"
        ></div>
        <div id="aviso" class="resultado__aviso"></div>
      </section>
    </main>

    <footer class="rodape">
      <p>
        Os resultados são uma referência. Consulte sempre um profissional de
        saúde.
      </p>
      <p class="rodape__creditos">
        Developed by
        <a
          href="https://github.com/joaoacastro"
          target="_blank"
          rel="noopener noreferrer"
          >joaoacastro</a
        >
      </p>
    </footer>

    <script src="dist/index.js"></script>
  </body>
</html>
